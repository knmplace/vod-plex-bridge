services:
  vod-plex-bridge:
    image: vod-plex-bridge:latest
    pull_policy: never
    container_name: vod-plex-bridge
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-8585}:8585"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/vod_bridge.db
      - CATEGORY_MAPPING_FILE=/data/category_mapping.json
      - STREAM_MAPPING_FILE=/data/stream_mapping.json
      - DISPATCHARR_XC_USERNAME=${DISPATCHARR_XC_USERNAME}
      - DISPATCHARR_XC_PASSWORD=${DISPATCHARR_XC_PASSWORD}
      - STRM_OUTPUT_DIR=/plex-vod/Movies
    volumes:
      - ${DATA_DIR:-/etc/docker/plexbridge/data}:/data
      - ${PLEX_VOD_DIR:-/mnt/media50/plex-vod}:/plex-vod
