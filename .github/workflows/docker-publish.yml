name: Build and Publish Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine beta version tag
        id: beta
        if: github.event_name == 'push'
        run: |
          # Read base version from app/main.py
          BASE_VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' app/main.py)

          # Find the highest existing beta number for this version
          LATEST_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" | sort -V | tail -1)
          if [ -z "$LATEST_BETA" ]; then
            BETA_NUM=1
          else
            BETA_NUM=$(echo "$LATEST_BETA" | grep -oP 'beta\.\K[0-9]+')
            BETA_NUM=$((BETA_NUM + 1))
          fi

          BETA_TAG="v${BASE_VERSION}-beta.${BETA_NUM}"
          echo "tag=$BETA_TAG" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "beta_num=$BETA_NUM" >> $GITHUB_OUTPUT

      - name: Generate beta release notes
        id: notes
        if: github.event_name == 'push'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -20)
          else
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD")
          fi

          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ## What's Changed

          NOTES_EOF

          echo "$COMMITS" | while IFS= read -r line; do
            echo "- $line" >> /tmp/release-notes.md
          done

          echo "" >> /tmp/release-notes.md
          echo "---" >> /tmp/release-notes.md
          echo "*This is a beta pre-release. Pull \`ghcr.io/${{ github.repository }}:beta\` to test.*" >> /tmp/release-notes.md

      - name: Create beta pre-release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.beta.outputs.tag }}"
          git push origin "${{ steps.beta.outputs.tag }}"
          gh release create "${{ steps.beta.outputs.tag }}" \
            --title "${{ steps.beta.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --prerelease

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On release: semver tags
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # On push to main: beta tag
            type=raw,value=beta,enable=${{ github.event_name == 'push' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
